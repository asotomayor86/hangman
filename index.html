<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>El Ahorcado</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Rye&family=Special+Elite&display=swap" rel="stylesheet">
<style>
  :root {
    --parchment: #f1dfb3;
    --parchment-dark: #d4b886;
    --parchment-light: #fff5d6;
    --leather: #6b3410;
    --leather-light: #8b4513;
    --leather-dark: #3e1f08;
    --ink: #2a1810;
    --ink-soft: #4a3020;
    --muted: #7a5e44;
    --red: #a02020;
    --red-dark: #6e1010;
    --green: #4a7c59;
    --green-dark: #2e5238;
    --gold: #c9a227;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; margin: 0; }
  body {
    font-family: 'Special Elite', 'Courier New', monospace;
    color: var(--ink);
    background: #1a1410;
    min-height: 100vh;
    padding: 20px 12px 40px;
    position: relative;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    z-index: -2;
    background: url('public/fondo.jpg') center center / cover no-repeat;
  }
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    z-index: -1;
    background:
      radial-gradient(ellipse at 70% 30%, rgba(40,25,10,0.2) 0%, rgba(20,10,5,0.7) 100%),
      linear-gradient(180deg, rgba(0,0,0,0.15) 0%, rgba(0,0,0,0.55) 100%);
    pointer-events: none;
  }
  .container {
    max-width: 540px;
    margin: 0 auto;
    text-align: center;
  }
  h1 {
    font-family: 'Rye', serif;
    font-size: clamp(38px, 9vw, 60px);
    color: var(--parchment-light);
    text-shadow:
      3px 3px 0 var(--leather-dark),
      6px 6px 14px rgba(0,0,0,0.9);
    letter-spacing: 0.04em;
    margin: 8px 0 8px;
    text-transform: uppercase;
    line-height: 1.1;
  }
  h2 {
    font-family: 'Rye', serif;
    font-size: 24px;
    color: var(--leather-dark);
    margin: 0 0 18px;
    letter-spacing: 0.02em;
  }
  h3 {
    font-family: 'Rye', serif;
    color: var(--leather-dark);
    margin-top: 0;
  }
  .room-info {
    color: var(--parchment-light);
    font-size: 13px;
    letter-spacing: 0.18em;
    margin-bottom: 18px;
    text-shadow: 1px 1px 3px rgba(0,0,0,0.95);
    text-transform: uppercase;
  }
  .room-info strong { color: var(--gold); font-size: 16px; }
  .scores {
    display: flex;
    gap: 12px;
    justify-content: center;
    margin-bottom: 22px;
    flex-wrap: wrap;
  }
  .score {
    background: var(--parchment);
    border: 3px solid var(--leather);
    border-radius: 6px;
    padding: 10px 18px;
    min-width: 140px;
    box-shadow: 0 4px 14px rgba(0,0,0,0.5);
    position: relative;
  }
  .score .name {
    font-family: 'Rye', serif;
    color: var(--leather-dark);
    display: block;
    margin-bottom: 2px;
    font-size: 15px;
    letter-spacing: 0.04em;
  }
  .score .value {
    font-family: 'Rye', serif;
    font-size: 32px;
    color: var(--leather-dark);
    line-height: 1;
  }
  .score .value.negative { color: var(--red-dark); }
  .score .ratio { font-size: 11px; color: var(--muted); margin-top: 2px; letter-spacing: 0.05em; }

  /* Panel principal estilo pergamino/cartel WANTED */
  #app {
    background: var(--parchment);
    background-image:
      radial-gradient(ellipse at 20% 0%, rgba(180,140,80,0.18) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 100%, rgba(120,80,40,0.18) 0%, transparent 50%);
    border: 4px solid var(--leather-dark);
    border-radius: 6px;
    padding: 28px 26px;
    box-shadow: 0 14px 50px rgba(0,0,0,0.7), inset 0 0 40px rgba(180,140,80,0.18);
    position: relative;
    text-align: left;
  }
  #app::before {
    content: '';
    position: absolute;
    inset: 6px;
    border: 1px dashed rgba(107, 52, 16, 0.35);
    pointer-events: none;
    border-radius: 3px;
  }

  /* Inputs */
  input[type=text], input[type=email], input[type=password] {
    width: 100%;
    padding: 12px 14px;
    font-family: 'Special Elite', monospace;
    font-size: 18px;
    border: 2px solid var(--leather);
    background: var(--parchment-light);
    color: var(--ink);
    border-radius: 4px;
    margin-bottom: 8px;
  }
  input:focus { outline: 2px solid var(--red); }

  .form-row { margin-bottom: 16px; text-align: left; }
  .form-row label {
    display: block;
    font-family: 'Rye', serif;
    color: var(--leather-dark);
    margin-bottom: 6px;
    font-size: 15px;
    letter-spacing: 0.03em;
  }

  /* Botones madera/cuero */
  button {
    font-family: 'Rye', serif;
    font-size: 17px;
    color: var(--parchment-light);
    padding: 12px 22px;
    background: linear-gradient(180deg, #a0522d 0%, #6b3410 100%);
    border: 2px solid var(--leather-dark);
    border-radius: 4px;
    cursor: pointer;
    text-shadow: 1px 1px 2px rgba(0,0,0,0.6);
    box-shadow: 0 4px 0 var(--leather-dark), 0 6px 12px rgba(0,0,0,0.35);
    transition: transform 0.05s, box-shadow 0.05s, background 0.15s;
    margin: 4px;
    letter-spacing: 0.04em;
  }
  button:hover:not(:disabled) {
    background: linear-gradient(180deg, #b87333 0%, #7d3f15 100%);
  }
  button:active:not(:disabled) {
    transform: translateY(2px);
    box-shadow: 0 2px 0 var(--leather-dark), 0 3px 6px rgba(0,0,0,0.35);
  }
  button:disabled { opacity: 0.5; cursor: not-allowed; }

  button.right {
    background: linear-gradient(180deg, #5d8c6a 0%, #2e5238 100%) !important;
    border-color: #1c3120;
    box-shadow: 0 4px 0 #1c3120, 0 6px 10px rgba(0,0,0,0.35);
  }
  button.wrong {
    background: linear-gradient(180deg, #8b1e1e 0%, #5c0e0e 100%) !important;
    border-color: #3a0808;
    box-shadow: 0 4px 0 #3a0808, 0 6px 10px rgba(0,0,0,0.35);
  }
  button.danger {
    background: linear-gradient(180deg, #a02020 0%, #6e1010 100%);
    border-color: #4a0808;
    box-shadow: 0 4px 0 #4a0808, 0 6px 10px rgba(0,0,0,0.35);
  }

  .big-button {
    display: block;
    width: 100%;
    max-width: 340px;
    margin: 12px auto;
    padding: 16px 24px;
    font-size: 20px;
  }

  .center { text-align: center; }

  /* Selector de tiempo */
  .time-options { display: flex; gap: 8px; flex-wrap: wrap; }
  .time-options button {
    flex: 1;
    min-width: 90px;
    font-size: 14px;
    padding: 10px 6px;
    background: linear-gradient(180deg, #c4b07e 0%, #8e7846 100%);
    border-color: #4a3c1c;
    color: var(--ink);
    text-shadow: 0 1px 1px rgba(255,235,170,0.5);
    box-shadow: 0 3px 0 #4a3c1c;
  }
  .time-options button:hover:not(:disabled) {
    background: linear-gradient(180deg, #d4c08c 0%, #a08648 100%);
  }
  .time-options button.selected {
    background: linear-gradient(180deg, #8b1e1e 0%, #5c0e0e 100%);
    color: var(--parchment-light);
    border-color: #3a0808;
    box-shadow: 0 3px 0 #3a0808;
    text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
  }

  /* Palabra a adivinar */
  .word-display {
    font-family: 'Rye', serif;
    font-size: clamp(32px, 7vw, 44px);
    letter-spacing: 8px;
    text-align: center;
    margin: 22px 0;
    color: var(--leather-dark);
    min-height: 52px;
    text-shadow: 2px 2px 0 rgba(212,184,134,0.55);
  }

  /* Alfabeto */
  .alphabet {
    display: grid;
    grid-template-columns: repeat(9, 1fr);
    gap: 5px;
    margin-top: 20px;
  }
  .alphabet button {
    padding: 10px 0;
    margin: 0;
    font-size: 16px;
    letter-spacing: 0;
  }

  /* Cuenta atrás */
  .timer-row {
    text-align: center;
    margin: 18px 0;
    padding: 12px;
    background: rgba(255, 245, 214, 0.45);
    border: 2px dashed var(--leather);
    border-radius: 6px;
  }
  .timer-label {
    font-family: 'Rye', serif;
    font-size: 12px;
    color: var(--ink-soft);
    margin-bottom: 4px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
  }
  .timer-value {
    font-family: 'Rye', serif;
    font-size: 42px;
    color: var(--leather-dark);
    letter-spacing: 4px;
    line-height: 1;
  }
  .timer-value.urgent {
    color: var(--red);
    animation: pulse 0.6s infinite alternate;
  }

  .hangman-svg { display: block; margin: 8px auto; }

  .info-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin: 14px 0;
    font-size: 15px;
    color: var(--ink-soft);
  }
  .wrong-letters {
    font-family: 'Rye', serif;
    color: var(--red);
    letter-spacing: 3px;
  }

  .result-message {
    font-family: 'Rye', serif;
    font-size: 26px;
    text-align: center;
    margin: 14px 0;
    letter-spacing: 0.03em;
  }
  .result-message.win { color: var(--green-dark); }
  .result-message.lose { color: var(--red); }
  .reveal {
    font-size: 18px;
    text-align: center;
    color: var(--ink-soft);
    margin: 10px 0;
  }
  .reveal strong {
    font-family: 'Rye', serif;
    font-size: 26px;
    color: var(--leather-dark);
    letter-spacing: 3px;
  }
  .hint {
    font-size: 14px;
    color: var(--muted);
    text-align: center;
    margin-top: 8px;
    font-style: italic;
  }

  .error-box {
    background: rgba(160,32,32,0.12);
    border-left: 4px solid var(--red);
    color: var(--red-dark);
    padding: 10px 14px;
    border-radius: 4px;
    margin: 12px 0;
    font-size: 15px;
    text-align: left;
  }
  .info-box {
    background: rgba(120,80,40,0.18);
    border-left: 4px solid var(--leather);
    color: var(--ink-soft);
    padding: 10px 14px;
    border-radius: 4px;
    margin: 12px 0;
    font-size: 15px;
    text-align: left;
  }
  .ok-box {
    background: rgba(74,124,89,0.18);
    border-left: 4px solid var(--green);
    color: var(--green-dark);
    padding: 10px 14px;
    border-radius: 4px;
    margin: 12px 0;
    text-align: center;
  }

  .login-card {
    background: rgba(255, 245, 214, 0.55);
    padding: 18px;
    border-radius: 6px;
    margin-top: 14px;
    border: 1px solid var(--leather);
  }

  .spinner {
    display: inline-block;
    width: 14px;
    height: 14px;
    border: 2px solid var(--muted);
    border-top-color: var(--leather-dark);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    vertical-align: middle;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes pulse {
    from { transform: scale(1); }
    to { transform: scale(1.12); }
  }

  @media (max-width: 600px) {
    .alphabet { grid-template-columns: repeat(7, 1fr); }
    .word-display { letter-spacing: 4px; }
    #app { padding: 22px 18px; }
  }
</style>
</head>
<body>
<div class="container">
  <h1>El Ahorcado</h1>
  <div id="room-info" class="room-info"></div>
  <div id="scores"></div>
  <div id="app"></div>
</div>

<script type="module">
const HUB_URL = 'https://one-page-to-rule-them-all.vercel.app';
const ALPHABET = 'ABCDEFGHIJKLMNÑOPQRSTUVWXYZ'.split('');
const MAX_ERRORS = 6;
const TIME_KEY = 'ahorcado-time-limit';

const state = {
  screen: 'loading',
  roomCode: '',
  room: null,
  players: [],
  timeLimit: 120,
  error: '',
  loggedIn: [],
  setter: null,
  guesser: null,
  game: null,
  sessionScores: {},
  resultStatus: null,
};

let tickInterval = null;

// ---------- Utilidades ----------
function escapeHtml(s) {
  const div = document.createElement('div');
  div.textContent = s == null ? '' : String(s);
  return div.innerHTML;
}

function normalize(s) {
  return s.toUpperCase()
    .replace(/Á/g, 'A').replace(/À/g, 'A').replace(/Â/g, 'A').replace(/Ä/g, 'A')
    .replace(/É/g, 'E').replace(/È/g, 'E').replace(/Ê/g, 'E').replace(/Ë/g, 'E')
    .replace(/Í/g, 'I').replace(/Ì/g, 'I').replace(/Î/g, 'I').replace(/Ï/g, 'I')
    .replace(/Ó/g, 'O').replace(/Ò/g, 'O').replace(/Ô/g, 'O').replace(/Ö/g, 'O')
    .replace(/Ú/g, 'U').replace(/Ù/g, 'U').replace(/Û/g, 'U').replace(/Ü/g, 'U');
}

function isValidWord(s) {
  const n = normalize(s.trim());
  if (n.length < 3) return false;
  if (!/^[A-ZÑ ]+$/.test(n)) return false;
  if (n.replace(/ /g, '').length < 3) return false;
  return true;
}

function formatTime(sec) {
  const m = Math.floor(sec / 60);
  const s = sec % 60;
  return `${m}:${s.toString().padStart(2, '0')}`;
}

function loadTimePref() {
  try {
    const raw = localStorage.getItem(TIME_KEY);
    const n = parseInt(raw || '', 10);
    if ([60, 120, 180].includes(n)) state.timeLimit = n;
  } catch {}
}

function saveTimePref() {
  try { localStorage.setItem(TIME_KEY, String(state.timeLimit)); } catch {}
}

// ---------- API calls ----------
async function loadRoom(code) {
  const res = await fetch(`${HUB_URL}/api/rooms/${encodeURIComponent(code)}`, {
    headers: { Accept: 'application/json' },
  });
  if (res.status === 404) return null;
  if (!res.ok) throw new Error(`El hub respondió ${res.status} al leer la sala`);
  return res.json();
}

async function neonLogin(email, password) {
  const res = await fetch(`${HUB_URL}/api/auth/sign-in/email`, {
    method: 'POST',
    credentials: 'include',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ email, password }),
  });
  let data = {};
  try { data = await res.json(); } catch {}
  if (!res.ok) {
    const msg = data?.message || data?.error?.message || 'Email o contraseña incorrectos.';
    throw new Error(msg);
  }
  const user = data?.user || data?.data?.user || data?.session?.user;
  if (!user?.id) throw new Error('No se pudo iniciar sesión.');
  return { id: user.id, name: user.name || user.email || '' };
}

async function neonLogout() {
  try {
    await fetch(`${HUB_URL}/api/auth/sign-out`, { method: 'POST', credentials: 'include' });
  } catch {}
}

async function setAccessCookie(user) {
  const res = await fetch('/api/access', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ userId: user.id, name: user.name }),
  });
  if (!res.ok) throw new Error('No se pudo registrar la sesión local.');
}

async function clearAccessCookie() {
  try { await fetch('/api/access', { method: 'DELETE' }); } catch {}
}

async function submitResultToHub(payload) {
  const res = await fetch('/api/result', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(payload),
  });
  let data = {};
  try { data = await res.json(); } catch {}
  if (!res.ok) throw new Error(data?.error || 'No se pudo enviar el resultado.');
  return data;
}

async function verifyWord(rawWord) {
  const words = rawWord.trim().toLowerCase().split(/\s+/).filter(w => w.length > 0);
  for (const w of words) {
    const url = `https://es.wiktionary.org/w/api.php?action=query&titles=${encodeURIComponent(w)}&format=json&origin=*`;
    const res = await fetch(url);
    if (!res.ok) throw new Error('Network');
    const data = await res.json();
    const pages = (data && data.query && data.query.pages) || {};
    const ids = Object.keys(pages);
    if (ids.length === 0) return { ok: false, missing: w };
    if ('missing' in pages[ids[0]]) return { ok: false, missing: w };
  }
  return { ok: true };
}

// ---------- Timer ----------
function startTimer() {
  stopTimer();
  tickInterval = setInterval(() => {
    if (!state.game || !state.game.endTime || state.screen !== 'guess') {
      stopTimer();
      return;
    }
    const remaining = state.game.endTime - Date.now();
    if (remaining <= 0) { stopTimer(); finishGame('time-out'); return; }
    updateTimerDisplay(remaining);
  }, 250);
}

function stopTimer() {
  if (tickInterval) { clearInterval(tickInterval); tickInterval = null; }
}

function updateTimerDisplay(remainingMs) {
  const el = document.getElementById('timer');
  if (!el) return;
  const sec = Math.max(0, Math.ceil(remainingMs / 1000));
  el.textContent = formatTime(sec);
  el.classList.toggle('urgent', sec <= 10);
}

// ---------- Render orchestrator ----------
function render() {
  if (state.screen !== 'guess') stopTimer();
  renderRoomInfo();
  renderScores();
  const app = document.getElementById('app');
  app.innerHTML = '';
  switch (state.screen) {
    case 'loading': return renderLoading(app);
    case 'error': return renderError(app);
    case 'login-1': return renderLogin1(app);
    case 'login-2': return renderLogin2(app);
    case 'choose-setter': return renderChooseSetter(app);
    case 'enter-word': return renderEnterWord(app);
    case 'handoff': return renderHandoff(app);
    case 'guess': return renderGuess(app);
    case 'result': return renderResult(app);
  }
}

function renderRoomInfo() {
  const el = document.getElementById('room-info');
  if (!state.room) { el.innerHTML = ''; return; }
  const gameName = state.room.game?.name || 'Ahorcado';
  el.innerHTML = `Sala <strong>${escapeHtml(state.room.code)}</strong> · ${escapeHtml(gameName)}`;
}

function renderScores() {
  const el = document.getElementById('scores');
  if (!state.players.length) { el.innerHTML = ''; return; }
  el.innerHTML = state.players.map(p => {
    const s = state.sessionScores[p.userId] || { wins: 0, losses: 0, score: 0 };
    const cls = s.score < 0 ? 'value negative' : 'value';
    return `<div class="score">
      <span class="name">${escapeHtml(p.name)}</span>
      <span class="${cls}">${s.score}</span>
      <div class="ratio">${s.wins} ganadas · ${s.losses} perdidas</div>
    </div>`;
  }).join('');
}

// ---------- Screens ----------
function renderLoading(app) {
  app.innerHTML = `<h2>Cargando sala…</h2><div class="center"><div class="spinner"></div></div>`;
}

function renderError(app) {
  app.innerHTML = `
    <h2>No se pudo entrar</h2>
    <div class="error-box">${escapeHtml(state.error || 'Error desconocido')}</div>
    <p class="hint">Vuelve al hub y crea una sala para entrar de nuevo.</p>
    <div class="center">
      <a href="${HUB_URL}"><button>Volver al hub</button></a>
    </div>
  `;
}

function renderChooseSetter(app) {
  const [p1, p2] = state.loggedIn;
  app.innerHTML = `
    <h2>¿Quién pone la palabra esta vez?</h2>
    <p class="hint">El que pone la palabra pierde 1 punto si la adivina el otro. Si se acaba el tiempo, el que adivina pierde 1.</p>
    <div class="form-row" style="margin-top:20px;">
      <label>Tiempo por partida</label>
      <div class="time-options">
        <button data-time="60">1 minuto</button>
        <button data-time="120">2 minutos</button>
        <button data-time="180">3 minutos</button>
      </div>
    </div>
    <div class="center" style="margin-top:24px;">
      <button class="big-button" data-setter="${escapeHtml(p1.id)}">${escapeHtml(p1.name)} pone la palabra</button>
      <button class="big-button" data-setter="${escapeHtml(p2.id)}">${escapeHtml(p2.name)} pone la palabra</button>
    </div>
  `;
  setupTimeButtons(app);
  app.querySelectorAll('button[data-setter]').forEach(btn => {
    btn.onclick = () => {
      const setterId = btn.dataset.setter;
      state.setter = state.loggedIn.find(p => p.id === setterId);
      state.guesser = state.loggedIn.find(p => p.id !== setterId);
      state.screen = 'enter-word';
      render();
    };
  });
}

function setupTimeButtons(container) {
  const buttons = container.querySelectorAll('.time-options button');
  const update = () => buttons.forEach(b => {
    b.classList.toggle('selected', parseInt(b.dataset.time) === state.timeLimit);
  });
  buttons.forEach(b => {
    b.onclick = () => {
      state.timeLimit = parseInt(b.dataset.time);
      saveTimePref();
      update();
    };
  });
  update();
}

function renderLoginForm(app, opts) {
  const { title, infoHtml, validate, onSuccess } = opts;
  app.innerHTML = `
    <h2>${escapeHtml(title)}</h2>
    <div class="info-box">${infoHtml}</div>
    <div class="login-card">
      <div class="form-row">
        <label for="email">Email de la cuenta del hub</label>
        <input type="email" id="email" autocomplete="email" autocapitalize="off">
      </div>
      <div class="form-row">
        <label for="password">Contraseña</label>
        <input type="password" id="password" autocomplete="current-password">
      </div>
      <div id="login-error"></div>
      <div class="center">
        <button class="big-button" id="login-btn">Iniciar sesión</button>
      </div>
    </div>
  `;
  const email = document.getElementById('email');
  const password = document.getElementById('password');
  const btn = document.getElementById('login-btn');
  const errBox = document.getElementById('login-error');
  email.focus();

  const submit = async () => {
    const e = email.value.trim();
    const p = password.value;
    if (!e || !p) {
      errBox.innerHTML = '<div class="error-box">Rellena email y contraseña.</div>';
      return;
    }
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Iniciando…';
    errBox.innerHTML = '';
    try {
      const user = await neonLogin(e, p);
      const errMsg = validate(user);
      if (errMsg) {
        await neonLogout();
        throw new Error(errMsg);
      }
      await setAccessCookie(user);
      onSuccess(user);
    } catch (e) {
      btn.disabled = false;
      btn.textContent = 'Iniciar sesión';
      errBox.innerHTML = `<div class="error-box">${escapeHtml(e.message)}</div>`;
    }
  };
  btn.onclick = submit;
  [email, password].forEach(inp => inp.addEventListener('keydown', ev => {
    if (ev.key === 'Enter') submit();
  }));
}

function renderLogin1(app) {
  const [p1, p2] = state.players;
  renderLoginForm(app, {
    title: 'Login del primer jugador',
    infoHtml: `Cualquiera puede empezar: <strong>${escapeHtml(p1.name)}</strong> o <strong>${escapeHtml(p2.name)}</strong>.`,
    validate: (user) => {
      if (!state.players.find(p => p.userId === user.id)) {
        return 'Esa cuenta no es jugador de esta sala.';
      }
      return null;
    },
    onSuccess: (user) => {
      const room = state.players.find(p => p.userId === user.id);
      state.loggedIn = [{ id: user.id, name: room.name }];
      state.screen = 'login-2';
      render();
    },
  });
}

function renderLogin2(app) {
  const first = state.loggedIn[0];
  const other = state.players.find(p => p.userId !== first.id);
  renderLoginForm(app, {
    title: `Login del segundo jugador`,
    infoHtml: `<strong>${escapeHtml(first.name)}</strong> ya está dentro. Ahora le toca a <strong>${escapeHtml(other.name)}</strong>.`,
    validate: (user) => {
      if (user.id === first.id) return 'Esa cuenta ya está registrada. Ahora tiene que entrar el otro jugador.';
      if (!state.players.find(p => p.userId === user.id)) {
        return 'Esa cuenta no es jugador de esta sala.';
      }
      return null;
    },
    onSuccess: (user) => {
      const room = state.players.find(p => p.userId === user.id);
      state.loggedIn.push({ id: user.id, name: room.name });
      state.screen = 'choose-setter';
      render();
    },
  });
}

function renderEnterWord(app) {
  app.innerHTML = `
    <h2>${escapeHtml(state.setter.name)}, escribe la palabra</h2>
    <p class="hint">El otro jugador no debe mirar. La palabra se ocultará mientras escribes.</p>
    <div class="form-row">
      <input type="password" id="word-input" placeholder="Palabra o frase corta" autocomplete="off" maxlength="40">
    </div>
    <p class="hint">Solo letras y espacios. Mínimo 3 letras. Las tildes se ignoran (la ñ sí cuenta). Se comprobará en el diccionario.</p>
    <button class="big-button" id="word-ok">Listo</button>
    <div id="verify-status"></div>
  `;
  const input = document.getElementById('word-input');
  const btn = document.getElementById('word-ok');
  const status = document.getElementById('verify-status');
  input.focus();

  const proceed = (raw) => {
    state.game = {
      originalWord: raw.trim(),
      word: normalize(raw),
      guessed: new Set(),
      wrong: new Set(),
      endTime: null,
      result: null,
    };
    state.screen = 'handoff';
    render();
  };

  const submit = async () => {
    const raw = input.value.trim();
    if (!isValidWord(raw)) {
      alert('Palabra no válida. Solo letras y espacios, mínimo 3 letras.');
      return;
    }
    btn.disabled = true;
    status.innerHTML = '<p class="hint" style="margin-top:16px;">Verificando que la palabra existe…</p>';
    let result;
    try {
      result = await verifyWord(raw);
    } catch {
      status.innerHTML = `
        <div class="error-box" style="margin-top:16px;">No se pudo conectar al diccionario.</div>
        <div class="center">
          <button id="continue-anyway">Continuar igualmente</button>
          <button id="retry-verify" class="danger">Reintentar</button>
        </div>`;
      document.getElementById('continue-anyway').onclick = () => proceed(raw);
      document.getElementById('retry-verify').onclick = () => { btn.disabled = false; status.innerHTML = ''; submit(); };
      return;
    }
    if (result.ok) {
      proceed(raw);
    } else {
      status.innerHTML = `
        <div class="error-box" style="margin-top:16px;">
          No encuentro <strong>${escapeHtml(result.missing || raw)}</strong> en el diccionario. Si es un nombre propio, puedes usarla igualmente.
        </div>
        <div class="center">
          <button id="try-again">Probar otra</button>
          <button id="force-use" class="danger">Usar igualmente</button>
        </div>`;
      document.getElementById('try-again').onclick = () => {
        btn.disabled = false;
        status.innerHTML = '';
        input.value = '';
        input.focus();
      };
      document.getElementById('force-use').onclick = () => proceed(raw);
    }
  };
  btn.onclick = submit;
  input.addEventListener('keydown', e => { if (e.key === 'Enter') submit(); });
}

function renderHandoff(app) {
  app.innerHTML = `
    <h2>Pasa el ordenador a ${escapeHtml(state.guesser.name)}</h2>
    <p class="hint">${escapeHtml(state.setter.name)} ya ha escrito la palabra. Cuando ${escapeHtml(state.guesser.name)} esté listo, empieza.</p>
    <div class="center">
      <button class="big-button" id="begin-btn">Empezar a adivinar</button>
    </div>
  `;
  document.getElementById('begin-btn').onclick = () => {
    state.screen = 'guess';
    render();
  };
}

function renderGuess(app) {
  const g = state.game;
  const errors = g.wrong.size;
  const livesLeft = MAX_ERRORS - errors;
  if (!g.endTime) g.endTime = Date.now() + state.timeLimit * 1000;
  const initialSec = Math.max(0, Math.ceil((g.endTime - Date.now()) / 1000));

  app.innerHTML = `
    <h2>Turno de ${escapeHtml(state.guesser.name)}</h2>
    <div class="timer-row">
      <div class="timer-label">Tiempo restante</div>
      <div class="timer-value${initialSec <= 10 ? ' urgent' : ''}" id="timer">${formatTime(initialSec)}</div>
    </div>
    ${hangmanSvg(errors)}
    <div class="word-display">${renderWordDisplay()}</div>
    <div class="info-row">
      <div>Vidas: <strong>${livesLeft}</strong> / ${MAX_ERRORS}</div>
      <div>Falladas: <span class="wrong-letters">${[...g.wrong].join(' ') || '—'}</span></div>
    </div>
    <div class="alphabet" id="alphabet"></div>
    <p class="hint">También puedes pulsar las teclas del teclado.</p>
  `;
  startTimer();
  const alpha = document.getElementById('alphabet');
  ALPHABET.forEach(letter => {
    const btn = document.createElement('button');
    btn.textContent = letter;
    if (g.guessed.has(letter)) { btn.classList.add('right'); btn.disabled = true; }
    else if (g.wrong.has(letter)) { btn.classList.add('wrong'); btn.disabled = true; }
    btn.onclick = () => guessLetter(letter);
    alpha.appendChild(btn);
  });
}

function renderWordDisplay() {
  const g = state.game;
  return g.word.split('').map(ch => {
    if (ch === ' ') return '  ';
    if (g.guessed.has(ch)) return ch;
    return '_';
  }).join(' ');
}

function guessLetter(letter) {
  const g = state.game;
  if (!g || state.screen !== 'guess') return;
  if (g.guessed.has(letter) || g.wrong.has(letter)) return;
  if (g.word.includes(letter)) {
    g.guessed.add(letter);
    if (isWordComplete()) { finishGame('guesser-wins'); return; }
  } else {
    g.wrong.add(letter);
    if (g.wrong.size >= MAX_ERRORS) { finishGame('setter-wins'); return; }
  }
  render();
}

function isWordComplete() {
  const g = state.game;
  return g.word.split('').every(ch => ch === ' ' || g.guessed.has(ch));
}

async function finishGame(outcome) {
  const g = state.game;
  stopTimer();
  const setter = state.setter, guesser = state.guesser;
  let results;
  if (outcome === 'guesser-wins') {
    g.result = 'guesser';
    bumpScore(guesser.id, +1, 'win');
    bumpScore(setter.id, -1, 'loss');
    results = [
      { userId: guesser.id, result: 'win' },
      { userId: setter.id, result: 'loss' },
    ];
  } else if (outcome === 'time-out') {
    g.result = 'time-out';
    bumpScore(setter.id, +1, 'win');
    bumpScore(guesser.id, -1, 'loss');
    results = [
      { userId: setter.id, result: 'win' },
      { userId: guesser.id, result: 'loss' },
    ];
  } else {
    g.result = 'setter';
    bumpScore(setter.id, +1, 'win');
    bumpScore(guesser.id, 0, 'loss');
    results = [
      { userId: setter.id, result: 'win' },
      { userId: guesser.id, result: 'loss' },
    ];
  }
  state.screen = 'result';
  state.resultStatus = { sending: true, ok: false, error: '' };
  render();
  try {
    await submitResultToHub({
      code: state.roomCode,
      results,
      notes: `Ahorcado: ${describeOutcome(outcome)}`,
    });
    state.resultStatus = { sending: false, ok: true, error: '' };
  } catch (e) {
    state.resultStatus = { sending: false, ok: false, error: e.message };
  }
  render();
}

function describeOutcome(outcome) {
  if (outcome === 'guesser-wins') return 'palabra adivinada';
  if (outcome === 'time-out') return 'tiempo agotado';
  return 'sin vidas';
}

function bumpScore(userId, delta, kind) {
  const s = state.sessionScores[userId] || { wins: 0, losses: 0, score: 0 };
  s.score += delta;
  if (kind === 'win') s.wins += 1;
  if (kind === 'loss') s.losses += 1;
  state.sessionScores[userId] = s;
}

function renderResult(app) {
  const g = state.game;
  const guesserName = state.guesser.name;
  const setterName = state.setter.name;
  let html = '';
  if (g.result === 'guesser') {
    html = `
      <div class="result-message win">¡${escapeHtml(guesserName)} ha adivinado la palabra!</div>
      <div class="reveal">La palabra era <strong>${escapeHtml(g.originalWord || g.word)}</strong></div>
      <div class="reveal" style="font-size:17px;">${escapeHtml(guesserName)} +1 · ${escapeHtml(setterName)} −1</div>
    `;
  } else if (g.result === 'time-out') {
    html = `
      <div class="result-message lose">¡Se acabó el tiempo!</div>
      <div class="reveal">La palabra era <strong>${escapeHtml(g.originalWord || g.word)}</strong></div>
      <div class="reveal" style="font-size:17px;">${escapeHtml(setterName)} +1 · ${escapeHtml(guesserName)} −1</div>
    `;
  } else {
    html = `
      <div class="result-message lose">${escapeHtml(guesserName)} no ha adivinado la palabra</div>
      ${hangmanSvg(MAX_ERRORS)}
      <div class="reveal">La palabra era <strong>${escapeHtml(g.originalWord || g.word)}</strong></div>
      <div class="reveal" style="font-size:17px;">${escapeHtml(setterName)} +1</div>
    `;
  }

  let statusHtml = '';
  if (state.resultStatus?.sending) {
    statusHtml = `<div class="info-box center"><span class="spinner"></span> Enviando resultado al hub…</div>`;
  } else if (state.resultStatus?.ok) {
    statusHtml = `<div class="ok-box">Resultado guardado en el hub.</div>`;
  } else if (state.resultStatus && !state.resultStatus.ok) {
    statusHtml = `
      <div class="error-box">No se pudo guardar el resultado: ${escapeHtml(state.resultStatus.error)}</div>
      <div class="center"><button id="retry-result">Reintentar envío</button></div>
    `;
  }

  app.innerHTML = html + statusHtml + `
    <div class="center" style="margin-top:24px;">
      <button class="big-button" id="again-btn" ${state.resultStatus?.sending ? 'disabled' : ''}>Otra partida</button>
    </div>
  `;

  const retry = document.getElementById('retry-result');
  if (retry) retry.onclick = async () => {
    retry.disabled = true;
    retry.innerHTML = '<span class="spinner"></span> Reintentando…';
    state.resultStatus = { sending: true, ok: false, error: '' };
    try {
      const results = computeResultsFromGame();
      await submitResultToHub({ code: state.roomCode, results, notes: `Ahorcado: ${describeOutcome(g.result === 'guesser' ? 'guesser-wins' : g.result === 'time-out' ? 'time-out' : 'setter-wins')}` });
      state.resultStatus = { sending: false, ok: true, error: '' };
    } catch (e) {
      state.resultStatus = { sending: false, ok: false, error: e.message };
    }
    render();
  };

  document.getElementById('again-btn').onclick = () => {
    state.setter = null;
    state.guesser = null;
    state.game = null;
    state.resultStatus = null;
    state.screen = 'choose-setter';
    render();
  };
}

function computeResultsFromGame() {
  const g = state.game;
  const setter = state.setter, guesser = state.guesser;
  if (g.result === 'guesser') {
    return [{ userId: guesser.id, result: 'win' }, { userId: setter.id, result: 'loss' }];
  }
  return [{ userId: setter.id, result: 'win' }, { userId: guesser.id, result: 'loss' }];
}

function hangmanSvg(errors) {
  const parts = [
    '<circle cx="130" cy="65" r="15" fill="none" stroke="#2a1810" stroke-width="3"/>',
    '<line x1="130" y1="80" x2="130" y2="140" stroke="#2a1810" stroke-width="3"/>',
    '<line x1="130" y1="95" x2="105" y2="120" stroke="#2a1810" stroke-width="3"/>',
    '<line x1="130" y1="95" x2="155" y2="120" stroke="#2a1810" stroke-width="3"/>',
    '<line x1="130" y1="140" x2="110" y2="180" stroke="#2a1810" stroke-width="3"/>',
    '<line x1="130" y1="140" x2="150" y2="180" stroke="#2a1810" stroke-width="3"/>',
  ];
  return `
    <svg class="hangman-svg" viewBox="0 0 200 240" width="200" height="240">
      <line x1="20" y1="225" x2="180" y2="225" stroke="#6b3410" stroke-width="6" stroke-linecap="round"/>
      <line x1="50" y1="225" x2="50" y2="20" stroke="#6b3410" stroke-width="6" stroke-linecap="round"/>
      <line x1="50" y1="20" x2="130" y2="20" stroke="#6b3410" stroke-width="6" stroke-linecap="round"/>
      <line x1="130" y1="20" x2="130" y2="50" stroke="#3e1f08" stroke-width="3"/>
      ${parts.slice(0, errors).join('')}
    </svg>
  `;
}

document.addEventListener('keydown', e => {
  if (state.screen !== 'guess') return;
  const key = e.key.toUpperCase();
  if (ALPHABET.includes(key)) guessLetter(key);
});

// ---------- Init ----------
async function init() {
  loadTimePref();
  const params = new URLSearchParams(location.search);
  const code = (params.get('sala') || '').trim().toUpperCase();
  if (!code) {
    state.screen = 'error';
    state.error = 'Falta el código de sala en la URL. Entra desde el hub.';
    render();
    return;
  }
  state.roomCode = code;
  state.screen = 'loading';
  render();
  try {
    const room = await loadRoom(code);
    if (!room) throw new Error('Sala no encontrada o caducada.');
    if (room.status && room.status !== 'open') {
      throw new Error('Esta sala ya está cerrada.');
    }
    const players = (room.players || []).filter(p => p.role === 'player');
    if (players.length !== 2) {
      throw new Error('El ahorcado necesita exactamente 2 jugadores en la sala.');
    }
    state.room = room;
    state.players = players;
    state.loggedIn = [];
    state.sessionScores = {};
    for (const p of players) {
      state.sessionScores[p.userId] = { wins: 0, losses: 0, score: 0 };
    }
    // Por si quedó alguna sesión abierta: limpiar antes de empezar
    await neonLogout();
    await clearAccessCookie();
    state.screen = 'login-1';
    render();
  } catch (e) {
    state.screen = 'error';
    state.error = e.message;
    render();
  }
}

init();
</script>
