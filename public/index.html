<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>El Ahorcado</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Rye&family=Special+Elite&display=swap" rel="stylesheet">
<style>
  :root {
    --parchment: #f1dfb3;
    --parchment-dark: #d4b886;
    --parchment-light: #fff5d6;
    --leather: #6b3410;
    --leather-light: #8b4513;
    --leather-dark: #3e1f08;
    --ink: #2a1810;
    --ink-soft: #4a3020;
    --muted: #7a5e44;
    --red: #a02020;
    --red-dark: #6e1010;
    --green: #4a7c59;
    --green-dark: #2e5238;
    --gold: #c9a227;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; margin: 0; }
  body {
    font-family: 'Special Elite', 'Courier New', monospace;
    color: var(--ink);
    background: #1a1410;
    min-height: 100vh;
    padding: 20px 12px 40px;
    position: relative;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    z-index: -2;
    background: url('fondo.jpg') center center / cover no-repeat;
  }
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    z-index: -1;
    background:
      radial-gradient(ellipse at 70% 30%, rgba(40,25,10,0.2) 0%, rgba(20,10,5,0.7) 100%),
      linear-gradient(180deg, rgba(0,0,0,0.15) 0%, rgba(0,0,0,0.55) 100%);
    pointer-events: none;
  }
  .container {
    max-width: 540px;
    margin: 0 auto;
    text-align: center;
  }
  h1 {
    font-family: 'Rye', serif;
    font-size: clamp(38px, 9vw, 60px);
    color: var(--parchment-light);
    text-shadow:
      3px 3px 0 var(--leather-dark),
      6px 6px 14px rgba(0,0,0,0.9);
    letter-spacing: 0.04em;
    margin: 8px 0 8px;
    text-transform: uppercase;
    line-height: 1.1;
  }
  h2 {
    font-family: 'Rye', serif;
    font-size: 24px;
    color: var(--leather-dark);
    margin: 0 0 18px;
    letter-spacing: 0.02em;
  }
  h3 {
    font-family: 'Rye', serif;
    color: var(--leather-dark);
    margin-top: 0;
  }
  .room-info {
    color: var(--parchment-light);
    font-size: 13px;
    letter-spacing: 0.18em;
    margin-bottom: 18px;
    text-shadow: 1px 1px 3px rgba(0,0,0,0.95);
    text-transform: uppercase;
  }
  .room-info strong { color: var(--gold); font-size: 16px; }

  /* Panel principal estilo pergamino/cartel WANTED */
  #app {
    background: var(--parchment);
    background-image:
      radial-gradient(ellipse at 20% 0%, rgba(180,140,80,0.18) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 100%, rgba(120,80,40,0.18) 0%, transparent 50%);
    border: 4px solid var(--leather-dark);
    border-radius: 6px;
    padding: 28px 26px;
    box-shadow: 0 14px 50px rgba(0,0,0,0.7), inset 0 0 40px rgba(180,140,80,0.18);
    position: relative;
    text-align: left;
  }
  #app::before {
    content: '';
    position: absolute;
    inset: 6px;
    border: 1px dashed rgba(107, 52, 16, 0.35);
    pointer-events: none;
    border-radius: 3px;
  }

  input[type=text], input[type=email], input[type=password] {
    width: 100%;
    padding: 12px 14px;
    font-family: 'Special Elite', monospace;
    font-size: 18px;
    border: 2px solid var(--leather);
    background: var(--parchment-light);
    color: var(--ink);
    border-radius: 4px;
    margin-bottom: 8px;
  }
  input:focus { outline: 2px solid var(--red); }

  .form-row { margin-bottom: 16px; text-align: left; }
  .form-row label {
    display: block;
    font-family: 'Rye', serif;
    color: var(--leather-dark);
    margin-bottom: 6px;
    font-size: 15px;
    letter-spacing: 0.03em;
  }

  button {
    font-family: 'Rye', serif;
    font-size: 17px;
    color: var(--parchment-light);
    padding: 12px 22px;
    background: linear-gradient(180deg, #a0522d 0%, #6b3410 100%);
    border: 2px solid var(--leather-dark);
    border-radius: 4px;
    cursor: pointer;
    text-shadow: 1px 1px 2px rgba(0,0,0,0.6);
    box-shadow: 0 4px 0 var(--leather-dark), 0 6px 12px rgba(0,0,0,0.35);
    transition: transform 0.05s, box-shadow 0.05s, background 0.15s;
    margin: 4px;
    letter-spacing: 0.04em;
  }
  button:hover:not(:disabled) {
    background: linear-gradient(180deg, #b87333 0%, #7d3f15 100%);
  }
  button:active:not(:disabled) {
    transform: translateY(2px);
    box-shadow: 0 2px 0 var(--leather-dark), 0 3px 6px rgba(0,0,0,0.35);
  }
  button:disabled { opacity: 0.5; cursor: not-allowed; }

  button.right {
    background: linear-gradient(180deg, #5d8c6a 0%, #2e5238 100%) !important;
    border-color: #1c3120;
    box-shadow: 0 4px 0 #1c3120, 0 6px 10px rgba(0,0,0,0.35);
  }
  button.wrong {
    background: linear-gradient(180deg, #8b1e1e 0%, #5c0e0e 100%) !important;
    border-color: #3a0808;
    box-shadow: 0 4px 0 #3a0808, 0 6px 10px rgba(0,0,0,0.35);
  }
  button.danger {
    background: linear-gradient(180deg, #a02020 0%, #6e1010 100%);
    border-color: #4a0808;
    box-shadow: 0 4px 0 #4a0808, 0 6px 10px rgba(0,0,0,0.35);
  }

  .big-button {
    display: block;
    width: 100%;
    max-width: 340px;
    margin: 12px auto;
    padding: 16px 24px;
    font-size: 20px;
  }

  .center { text-align: center; }

  .time-options { display: flex; gap: 8px; flex-wrap: wrap; }
  .time-options button {
    flex: 1;
    min-width: 90px;
    font-size: 14px;
    padding: 10px 6px;
    background: linear-gradient(180deg, #c4b07e 0%, #8e7846 100%);
    border-color: #4a3c1c;
    color: var(--ink);
    text-shadow: 0 1px 1px rgba(255,235,170,0.5);
    box-shadow: 0 3px 0 #4a3c1c;
  }
  .time-options button:hover:not(:disabled) {
    background: linear-gradient(180deg, #d4c08c 0%, #a08648 100%);
  }
  .time-options button.selected {
    background: linear-gradient(180deg, #8b1e1e 0%, #5c0e0e 100%);
    color: var(--parchment-light);
    border-color: #3a0808;
    box-shadow: 0 3px 0 #3a0808;
    text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
  }

  .word-display {
    font-family: 'Rye', serif;
    font-size: clamp(32px, 7vw, 44px);
    letter-spacing: 8px;
    text-align: center;
    margin: 22px 0;
    color: var(--leather-dark);
    min-height: 52px;
    text-shadow: 2px 2px 0 rgba(212,184,134,0.55);
  }

  .alphabet {
    display: grid;
    grid-template-columns: repeat(9, 1fr);
    gap: 5px;
    margin-top: 20px;
  }
  .alphabet button {
    padding: 10px 0;
    margin: 0;
    font-size: 16px;
    letter-spacing: 0;
  }

  .timer-row {
    text-align: center;
    margin: 18px 0;
    padding: 12px;
    background: rgba(255, 245, 214, 0.45);
    border: 2px dashed var(--leather);
    border-radius: 6px;
  }
  .timer-label {
    font-family: 'Rye', serif;
    font-size: 12px;
    color: var(--ink-soft);
    margin-bottom: 4px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
  }
  .timer-value {
    font-family: 'Rye', serif;
    font-size: 42px;
    color: var(--leather-dark);
    letter-spacing: 4px;
    line-height: 1;
  }
  .timer-value.urgent {
    color: var(--red);
    animation: pulse 0.6s infinite alternate;
  }

  .hangman-svg { display: block; margin: 8px auto; }

  .info-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin: 14px 0;
    font-size: 15px;
    color: var(--ink-soft);
  }
  .wrong-letters {
    font-family: 'Rye', serif;
    color: var(--red);
    letter-spacing: 3px;
  }

  .result-message {
    font-family: 'Rye', serif;
    font-size: 26px;
    text-align: center;
    margin: 14px 0;
    letter-spacing: 0.03em;
  }
  .result-message.win { color: var(--green-dark); }
  .result-message.lose { color: var(--red); }
  .reveal {
    font-size: 18px;
    text-align: center;
    color: var(--ink-soft);
    margin: 10px 0;
  }
  .reveal strong {
    font-family: 'Rye', serif;
    font-size: 26px;
    color: var(--leather-dark);
    letter-spacing: 3px;
  }
  .hint {
    font-size: 14px;
    color: var(--muted);
    text-align: center;
    margin-top: 8px;
    font-style: italic;
  }

  .error-box {
    background: rgba(160,32,32,0.12);
    border-left: 4px solid var(--red);
    color: var(--red-dark);
    padding: 10px 14px;
    border-radius: 4px;
    margin: 12px 0;
    font-size: 15px;
    text-align: left;
  }
  .info-box {
    background: rgba(120,80,40,0.18);
    border-left: 4px solid var(--leather);
    color: var(--ink-soft);
    padding: 10px 14px;
    border-radius: 4px;
    margin: 12px 0;
    font-size: 15px;
    text-align: left;
  }
  .ok-box {
    background: rgba(74,124,89,0.18);
    border-left: 4px solid var(--green);
    color: var(--green-dark);
    padding: 10px 14px;
    border-radius: 4px;
    margin: 12px 0;
    text-align: center;
  }

  .player-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: rgba(255, 245, 214, 0.5);
    border: 1px solid var(--leather);
    border-radius: 6px;
    padding: 10px 14px;
    margin: 8px 0;
    font-family: 'Rye', serif;
    color: var(--leather-dark);
  }
  .player-row.you { border-color: var(--red); background: rgba(160,32,32,0.08); }
  .player-row .name { font-size: 17px; }
  .player-row .status { font-size: 13px; color: var(--muted); font-family: 'Special Elite', monospace; }
  .player-row .status.ready { color: var(--green-dark); }

  .login-card {
    background: rgba(255, 245, 214, 0.55);
    padding: 18px;
    border-radius: 6px;
    margin-top: 14px;
    border: 1px solid var(--leather);
  }

  .spinner {
    display: inline-block;
    width: 14px;
    height: 14px;
    border: 2px solid var(--muted);
    border-top-color: var(--leather-dark);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    vertical-align: middle;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes pulse {
    from { transform: scale(1); }
    to { transform: scale(1.12); }
  }

  @media (max-width: 600px) {
    .alphabet { grid-template-columns: repeat(7, 1fr); }
    .word-display { letter-spacing: 4px; }
    #app { padding: 22px 18px; }
  }
</style>
</head>
<body>
<div class="container">
  <h1>El Ahorcado</h1>
  <div id="room-info" class="room-info"></div>
  <div id="app"></div>
</div>

<script type="module">
// Dominio del hub. Si abrimos el juego desde un subdominio de gamehub.family
// (entorno productivo con dominio propio), apuntamos al hub en la raíz para
// que la cookie de Neon Auth (Domain=.gamehub.family) se comparta y no haya
// que volver a hacer login. Si entramos por la URL de Vercel
// (hangman-one-lyart.vercel.app), seguimos hablando con el hub en
// one-page-to-rule-them-all.vercel.app igual que antes (sin SSO compartido).
const HUB_URL = typeof location !== 'undefined' && location.hostname.endsWith('gamehub.family')
  ? 'https://gamehub.family'
  : 'https://one-page-to-rule-them-all.vercel.app';
// Prefijo de ruta del juego. Cuando el juego se sirve bajo el hub
// (gamehub.family/hangman/...) las llamadas a la API y los enlaces deben
// llevar /hangman delante para que el rewrite las dirija a este proyecto.
// Si estamos en el subdominio (hangman.gamehub.family) o en cualquier otra
// URL, el prefijo queda vacío y todo va a la raíz como hasta ahora.
const PATH_PREFIX = (() => {
  if (typeof location === 'undefined') return '';
  // El rewrite del hub solo aplica cuando estamos en gamehub.family raíz.
  if (location.hostname === 'gamehub.family' && location.pathname.startsWith('/hangman')) {
    return '/hangman';
  }
  return '';
})();
const API = (p) => `${PATH_PREFIX}${p}`;
const ALPHABET = 'ABCDEFGHIJKLMNÑOPQRSTUVWXYZ'.split('');
const MAX_ERRORS = 6;
const POLL_MS = 1500;

const ui = {
  screen: 'loading',   // loading | login | error | game
  roomCode: '',
  roomMeta: null,      // { players: [{userId, name, role}] } del hub (público)
  me: null,            // { id, name } después de login
  state: null,         // estado vivo del servidor
  errorMsg: '',
  busy: false,         // bloquea polling cuando hay una acción crítica (ej. set-word)
  submittedResultV: -1,// versión del estado en la que ya hemos disparado submit-result
};

let pollTimer = null;
let displayTimer = null;
let lastRenderedV = -1;

// ---------- Utilidades ----------
function escapeHtml(s) {
  const div = document.createElement('div');
  div.textContent = s == null ? '' : String(s);
  return div.innerHTML;
}

function normalize(s) {
  return s.toUpperCase()
    .replace(/Á|À|Â|Ä/g, 'A')
    .replace(/É|È|Ê|Ë/g, 'E')
    .replace(/Í|Ì|Î|Ï/g, 'I')
    .replace(/Ó|Ò|Ô|Ö/g, 'O')
    .replace(/Ú|Ù|Û|Ü/g, 'U');
}

function isValidWord(s) {
  const n = normalize(String(s).trim());
  if (n.length < 3) return false;
  if (!/^[A-ZÑ ]+$/.test(n)) return false;
  if (n.replace(/ /g, '').length < 3) return false;
  return true;
}

function formatTime(sec) {
  const m = Math.floor(sec / 60);
  const s = sec % 60;
  return `${m}:${s.toString().padStart(2, '0')}`;
}

function maskedToDisplay(masked) {
  if (!masked) return '';
  return masked.split('').map(ch => ch === ' ' ? '  ' : ch).join(' ');
}

function hangmanSvg(errors) {
  const parts = [
    '<circle cx="130" cy="65" r="15" fill="none" stroke="#2a1810" stroke-width="3"/>',
    '<line x1="130" y1="80" x2="130" y2="140" stroke="#2a1810" stroke-width="3"/>',
    '<line x1="130" y1="95" x2="105" y2="120" stroke="#2a1810" stroke-width="3"/>',
    '<line x1="130" y1="95" x2="155" y2="120" stroke="#2a1810" stroke-width="3"/>',
    '<line x1="130" y1="140" x2="110" y2="180" stroke="#2a1810" stroke-width="3"/>',
    '<line x1="130" y1="140" x2="150" y2="180" stroke="#2a1810" stroke-width="3"/>',
  ];
  return `
    <svg class="hangman-svg" viewBox="0 0 200 240" width="200" height="240">
      <line x1="20" y1="225" x2="180" y2="225" stroke="#6b3410" stroke-width="6" stroke-linecap="round"/>
      <line x1="50" y1="225" x2="50" y2="20" stroke="#6b3410" stroke-width="6" stroke-linecap="round"/>
      <line x1="50" y1="20" x2="130" y2="20" stroke="#6b3410" stroke-width="6" stroke-linecap="round"/>
      <line x1="130" y1="20" x2="130" y2="50" stroke="#3e1f08" stroke-width="3"/>
      ${parts.slice(0, errors).join('')}
    </svg>
  `;
}

// ---------- API ----------
async function loadRoomMeta(code) {
  const res = await fetch(`${HUB_URL}/api/rooms/${encodeURIComponent(code)}`, {
    headers: { Accept: 'application/json' },
  });
  if (res.status === 404) return null;
  if (!res.ok) throw new Error(`El hub respondió ${res.status} al leer la sala`);
  return res.json();
}

async function neonLogin(email, password) {
  const res = await fetch(`${HUB_URL}/api/auth/sign-in/email`, {
    method: 'POST',
    credentials: 'include',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ email, password }),
  });
  let data = {};
  try { data = await res.json(); } catch {}
  if (!res.ok) {
    const msg = data?.message || data?.error?.message || 'Email o contraseña incorrectos.';
    throw new Error(msg);
  }
  const user = data?.user || data?.data?.user || data?.session?.user;
  if (!user?.id) throw new Error('No se pudo iniciar sesión.');
  return { id: user.id, name: user.name || user.email || '' };
}

async function neonLogout() {
  try {
    await fetch(`${HUB_URL}/api/auth/sign-out`, { method: 'POST', credentials: 'include' });
  } catch {}
}

/**
 * Intenta heredar la sesión ya iniciada en el hub: si el navegador tiene la
 * cookie del hub (mismo Neon Auth), no hace falta pedir email+contraseña aquí.
 * Devuelve {id, name} o null si no hay sesión o el navegador bloquea la cookie
 * cross-origin (SameSite=Lax sin SameSite=None pasa esto en algunos navegadores).
 */
async function tryHubSession() {
  try {
    const res = await fetch(`${HUB_URL}/api/auth/get-session`, {
      credentials: 'include',
      headers: { Accept: 'application/json' },
    });
    if (!res.ok) return null;
    const data = await res.json();
    const user = data?.user || data?.data?.user || data?.session?.user;
    if (!user?.id) return null;
    return { id: user.id, name: user.name || user.email || '' };
  } catch {
    return null;
  }
}

async function setAccessCookie(user) {
  const res = await fetch(API('/api/access'), {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ userId: user.id, name: user.name }),
  });
  if (!res.ok) throw new Error('No se pudo registrar la sesión local.');
}

async function clearAccessCookie() {
  try { await fetch(API('/api/access'), { method: 'DELETE' }); } catch {}
}

function extractErrorText(data, status) {
  if (!data) return `error ${status}`;
  if (typeof data.error === 'string') return data.error;
  if (data.error && typeof data.error === 'object') {
    return data.error.message || data.error.code || JSON.stringify(data.error);
  }
  if (typeof data.message === 'string') return data.message;
  return `error ${status}`;
}

async function fetchState() {
  const res = await fetch(API(`/api/state?code=${encodeURIComponent(ui.roomCode)}`), {
    headers: { Accept: 'application/json' },
  });
  if (res.status === 401) { const e = new Error('Sesión expirada'); e.status = 401; throw e; }
  let data = {};
  try { data = await res.json(); } catch {}
  if (!res.ok) {
    const e = new Error(extractErrorText(data, res.status));
    e.status = res.status;
    throw e;
  }
  return data;
}

async function dispatch(type, payload = {}) {
  const res = await fetch(API('/api/action'), {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ code: ui.roomCode, type, payload }),
  });
  let data = {};
  try { data = await res.json(); } catch {}
  if (!res.ok) throw new Error(extractErrorText(data, res.status));
  // Tras una acción, refrescar el estado de inmediato (no esperar al siguiente poll)
  try {
    const s = await fetchState();
    onState(s);
  } catch {}
  return data;
}

async function verifyWord(rawWord) {
  const words = rawWord.trim().toLowerCase().split(/\s+/).filter(w => w.length > 0);
  for (const w of words) {
    const url = `https://es.wiktionary.org/w/api.php?action=query&titles=${encodeURIComponent(w)}&format=json&origin=*`;
    const res = await fetch(url);
    if (!res.ok) throw new Error('Network');
    const data = await res.json();
    const pages = (data && data.query && data.query.pages) || {};
    const ids = Object.keys(pages);
    if (ids.length === 0) return { ok: false, missing: w };
    if ('missing' in pages[ids[0]]) return { ok: false, missing: w };
  }
  return { ok: true };
}

// ---------- Polling ----------
function startPolling() {
  stopPolling();
  pollOnce();
  pollTimer = setInterval(pollOnce, POLL_MS);
}

function stopPolling() {
  if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
}

async function pollOnce() {
  if (ui.busy) return;
  try {
    const s = await fetchState();
    onState(s);
  } catch (e) {
    if (e.status === 401) {
      stopPolling();
      ui.screen = 'login';
      render();
    } else {
      console.warn('poll:', e.message);
    }
  }
}

function onState(s) {
  ui.state = s;
  if (s.me) ui.me = s.me;
  const changed = s.v !== lastRenderedV;
  lastRenderedV = s.v;
  if (changed) render();
  updateTimerDisplay();

  // Auto-submit del resultado en cuanto hay outcome y aún no se ha enviado
  if (s.phase === 'result' && s.round?.result &&
      !s.round.resultStatus?.ok && !s.round.resultStatus?.sending &&
      ui.submittedResultV !== s.v) {
    ui.submittedResultV = s.v;
    dispatch('submit-result').catch(e => console.warn('submit-result:', e.message));
  }
  if (s.phase !== 'result') ui.submittedResultV = -1;
}

// ---------- Cronómetro de pantalla ----------
function startDisplayTimer() {
  stopDisplayTimer();
  displayTimer = setInterval(updateTimerDisplay, 250);
}
function stopDisplayTimer() {
  if (displayTimer) { clearInterval(displayTimer); displayTimer = null; }
}
function updateTimerDisplay() {
  const el = document.getElementById('timer');
  if (!el) return;
  const endTime = ui.state?.round?.endTime;
  if (!endTime) return;
  const remaining = Math.max(0, endTime - Date.now());
  const sec = Math.ceil(remaining / 1000);
  el.textContent = formatTime(sec);
  el.classList.toggle('urgent', sec <= 10);
}

// ---------- Render principal ----------
function render() {
  renderRoomInfo();
  const app = document.getElementById('app');
  app.innerHTML = '';

  if (ui.screen === 'loading') return renderLoading(app);
  if (ui.screen === 'error') return renderError(app);
  if (ui.screen === 'login') { stopDisplayTimer(); return renderLogin(app); }

  // Pantallas de juego: usa la fase del servidor
  const phase = ui.state?.phase;
  if (!phase) return renderLoading(app);

  if (phase === 'guessing') startDisplayTimer();
  else stopDisplayTimer();

  if (phase !== 'result') stopResultCountdown();

  if (phase === 'lobby') return renderLobby(app);
  if (phase === 'writing') return renderWriting(app);
  if (phase === 'guessing') return renderGuessing(app);
  if (phase === 'result') return renderResult(app);
}

function renderRoomInfo() {
  const el = document.getElementById('room-info');
  const code = ui.state?.code || ui.roomCode;
  el.innerHTML = code ? `Sala <strong>${escapeHtml(code)}</strong> · Ahorcado` : '';
}

// ---------- Pantallas ----------
function renderLoading(app) {
  app.innerHTML = `<h2>Cargando sala…</h2><div class="center"><div class="spinner"></div></div>`;
}

function renderError(app) {
  app.innerHTML = `
    <h2>No se pudo entrar</h2>
    <div class="error-box">${escapeHtml(ui.errorMsg || 'Error desconocido')}</div>
    <p class="hint">Vuelve al hub y crea una sala para entrar de nuevo.</p>
    <div class="center">
      <a href="${HUB_URL}"><button>Volver al hub</button></a>
    </div>
  `;
}

function renderLogin(app) {
  const players = (ui.roomMeta?.players || []).filter(p => p.role === 'player');
  const intro = players.length === 2
    ? `En esta sala: <strong>${escapeHtml(players[0].name)}</strong> y <strong>${escapeHtml(players[1].name)}</strong>. Cada uno entra con su cuenta del hub.`
    : 'Inicia sesión con tu cuenta del hub.';
  app.innerHTML = `
    <h2>Inicia sesión</h2>
    <div class="info-box">${intro}</div>
    <div class="login-card">
      <div class="form-row">
        <label for="email">Email</label>
        <input type="email" id="email" autocomplete="email" autocapitalize="off">
      </div>
      <div class="form-row">
        <label for="password">Contraseña</label>
        <input type="password" id="password" autocomplete="current-password">
      </div>
      <div id="login-error"></div>
      <div class="center">
        <button class="big-button" id="login-btn">Iniciar sesión</button>
      </div>
    </div>
  `;
  const email = document.getElementById('email');
  const password = document.getElementById('password');
  const btn = document.getElementById('login-btn');
  const errBox = document.getElementById('login-error');
  email.focus();

  const submit = async () => {
    const e = email.value.trim();
    const p = password.value;
    if (!e || !p) {
      errBox.innerHTML = '<div class="error-box">Rellena email y contraseña.</div>';
      return;
    }
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Iniciando…';
    errBox.innerHTML = '';
    try {
      const user = await neonLogin(e, p);
      await setAccessCookie(user);
      ui.me = user;
      // Cargar estado para confirmar que estás en la sala
      const s = await fetchState();
      ui.state = s;
      const me = s.players.find(p => p.userId === user.id);
      if (me) ui.me = { id: me.userId, name: me.name };
      ui.screen = 'game';
      render();
      startPolling();
    } catch (e) {
      btn.disabled = false;
      btn.textContent = 'Iniciar sesión';
      errBox.innerHTML = `<div class="error-box">${escapeHtml(e.message)}</div>`;
      await neonLogout();
      await clearAccessCookie();
    }
  };
  btn.onclick = submit;
  [email, password].forEach(inp => inp.addEventListener('keydown', ev => {
    if (ev.key === 'Enter') submit();
  }));
}

function renderLobby(app) {
  const s = ui.state;
  const me = s.players.find(p => p.userId === ui.me?.id);
  const other = s.players.find(p => p.userId !== ui.me?.id);
  const bothJoined = s.players.every(p => p.joined);

  const playersHtml = s.players.map(p => {
    const isMe = p.userId === ui.me?.id;
    return `
      <div class="player-row${isMe ? ' you' : ''}">
        <span class="name">${escapeHtml(p.name)}${isMe ? ' (tú)' : ''}</span>
        <span class="status${p.joined ? ' ready' : ''}">${p.joined ? '✓ En la sala' : 'Esperando…'}</span>
      </div>
    `;
  }).join('');

  let bodyHtml;
  if (!bothJoined) {
    bodyHtml = `
      <div class="info-box center">
        <span class="spinner"></span>
        Esperando a <strong>${escapeHtml(other?.name || 'el otro jugador')}</strong>…
      </div>
      <p class="hint">Cuando entre, aparecerá el botón para empezar.</p>
    `;
  } else {
    bodyHtml = `
      <div class="form-row" style="margin-top:16px;">
        <label>Tiempo por partida</label>
        <div class="time-options">
          <button data-time="60">1 min</button>
          <button data-time="120">2 min</button>
          <button data-time="180">3 min</button>
        </div>
      </div>
      <h3 style="margin-top:18px;">¿Quién pone la palabra?</h3>
      <div class="center">
        ${s.players.map(p => `<button class="big-button" data-setter="${escapeHtml(p.userId)}">${escapeHtml(p.name)} pone la palabra</button>`).join('')}
      </div>
    `;
  }

  app.innerHTML = `
    <h2>Sala lista</h2>
    ${playersHtml}
    ${bodyHtml}
  `;

  if (bothJoined) {
    setupTimeButtons(app);
    app.querySelectorAll('button[data-setter]').forEach(btn => {
      btn.onclick = async () => {
        app.querySelectorAll('button[data-setter]').forEach(b => b.disabled = true);
        try {
          await dispatch('choose-setter', { setterId: btn.dataset.setter });
        } catch (e) {
          app.querySelectorAll('button[data-setter]').forEach(b => b.disabled = false);
          alert(e.message);
        }
      };
    });
  }
}

function setupTimeButtons(container) {
  const buttons = container.querySelectorAll('.time-options button');
  const update = () => buttons.forEach(b => {
    b.classList.toggle('selected', parseInt(b.dataset.time) === ui.state?.timeLimit);
  });
  buttons.forEach(b => {
    b.onclick = async () => {
      buttons.forEach(x => x.disabled = true);
      try {
        await dispatch('set-time', { timeLimit: parseInt(b.dataset.time) });
      } catch (e) {
        alert(e.message);
      } finally {
        buttons.forEach(x => x.disabled = false);
      }
    };
  });
  update();
}

function renderWriting(app) {
  const s = ui.state;
  const isSetter = s.round.setterId === ui.me?.id;
  const setter = s.players.find(p => p.userId === s.round.setterId);
  const guesser = s.players.find(p => p.userId === s.round.guesserId);

  if (!isSetter) {
    app.innerHTML = `
      <h2>${escapeHtml(setter.name)} está escribiendo la palabra</h2>
      <div class="info-box center"><span class="spinner"></span> Espera tu turno para adivinar…</div>
    `;
    return;
  }

  app.innerHTML = `
    <h2>Escribe la palabra</h2>
    <p class="hint">El otro jugador no la verá hasta que termine la partida.</p>
    <div class="form-row">
      <input type="password" id="word-input" placeholder="Palabra o frase corta" autocomplete="off" maxlength="40">
    </div>
    <p class="hint">Solo letras y espacios. Mínimo 3 letras. Tildes ignoradas (la ñ sí cuenta). Se comprobará en el diccionario.</p>
    <button class="big-button" id="word-ok">Listo</button>
    <div id="verify-status"></div>
  `;
  const input = document.getElementById('word-input');
  const btn = document.getElementById('word-ok');
  const status = document.getElementById('verify-status');
  input.focus();

  const send = async (raw) => {
    ui.busy = true;
    try {
      await dispatch('set-word', { word: raw });
    } catch (e) {
      alert('No se pudo enviar la palabra: ' + e.message);
      btn.disabled = false;
    } finally {
      ui.busy = false;
    }
  };

  const submit = async () => {
    const raw = input.value.trim();
    if (!isValidWord(raw)) {
      alert('Palabra no válida. Solo letras y espacios, mínimo 3 letras.');
      return;
    }
    btn.disabled = true;
    status.innerHTML = '<p class="hint" style="margin-top:16px;">Verificando que la palabra existe…</p>';
    let result;
    try {
      result = await verifyWord(raw);
    } catch {
      status.innerHTML = `
        <div class="error-box" style="margin-top:16px;">No se pudo conectar al diccionario.</div>
        <div class="center">
          <button id="continue-anyway">Continuar igualmente</button>
          <button id="retry-verify" class="danger">Reintentar</button>
        </div>`;
      document.getElementById('continue-anyway').onclick = () => send(raw);
      document.getElementById('retry-verify').onclick = () => { btn.disabled = false; status.innerHTML = ''; submit(); };
      return;
    }
    if (result.ok) {
      send(raw);
    } else {
      status.innerHTML = `
        <div class="error-box" style="margin-top:16px;">
          No encuentro <strong>${escapeHtml(result.missing || raw)}</strong> en el diccionario. Si es un nombre propio, puedes usarla igualmente.
        </div>
        <div class="center">
          <button id="try-again">Probar otra</button>
          <button id="force-use" class="danger">Usar igualmente</button>
        </div>`;
      document.getElementById('try-again').onclick = () => {
        btn.disabled = false;
        status.innerHTML = '';
        input.value = '';
        input.focus();
      };
      document.getElementById('force-use').onclick = () => send(raw);
    }
  };
  btn.onclick = submit;
  input.addEventListener('keydown', e => { if (e.key === 'Enter') submit(); });
}

function renderGuessing(app) {
  const s = ui.state;
  const r = s.round;
  const isGuesser = r.guesserId === ui.me?.id;
  const guesser = s.players.find(p => p.userId === r.guesserId);
  const setter = s.players.find(p => p.userId === r.setterId);
  const errors = r.wrong.length;
  const livesLeft = MAX_ERRORS - errors;
  const remaining = Math.max(0, (r.endTime || 0) - Date.now());
  const initialSec = Math.ceil(remaining / 1000);

  const youInfo = isGuesser
    ? `Tu turno, ${escapeHtml(guesser.name)}.`
    : `Mira cómo ${escapeHtml(guesser.name)} intenta adivinar tu palabra.`;

  app.innerHTML = `
    <h2>${escapeHtml(youInfo)}</h2>
    <div class="timer-row">
      <div class="timer-label">Tiempo restante</div>
      <div class="timer-value${initialSec <= 10 ? ' urgent' : ''}" id="timer">${formatTime(initialSec)}</div>
    </div>
    ${hangmanSvg(errors)}
    <div class="word-display">${maskedToDisplay(r.maskedWord)}</div>
    <div class="info-row">
      <div>Vidas: <strong>${livesLeft}</strong> / ${MAX_ERRORS}</div>
      <div>Falladas: <span class="wrong-letters">${r.wrong.join(' ') || '—'}</span></div>
    </div>
    <div class="alphabet" id="alphabet"></div>
    <p class="hint">${isGuesser ? 'Pulsa las letras o usa el teclado.' : 'Solo el que adivina puede pulsar letras.'}</p>
  `;
  const alpha = document.getElementById('alphabet');
  const guessedSet = new Set(r.guessed);
  const wrongSet = new Set(r.wrong);
  ALPHABET.forEach(letter => {
    const btn = document.createElement('button');
    btn.textContent = letter;
    if (guessedSet.has(letter)) { btn.classList.add('right'); btn.disabled = true; }
    else if (wrongSet.has(letter)) { btn.classList.add('wrong'); btn.disabled = true; }
    else if (!isGuesser) { btn.disabled = true; }
    btn.onclick = async () => {
      btn.disabled = true;
      try {
        await dispatch('guess-letter', { letter });
      } catch (e) {
        btn.disabled = false;
        alert(e.message);
      }
    };
    alpha.appendChild(btn);
  });
}

function renderResult(app) {
  const s = ui.state;
  const r = s.round;
  const series = s.series || {};
  const guesser = s.players.find(p => p.userId === r.guesserId);
  const setter = s.players.find(p => p.userId === r.setterId);

  let html = '';
  if (r.result === 'guesser') {
    html = `
      <div class="result-message win">¡${escapeHtml(guesser.name)} ha adivinado la palabra!</div>
      <div class="reveal">La palabra era <strong>${escapeHtml(r.originalWord || r.maskedWord)}</strong></div>
    `;
  } else if (r.result === 'time-out') {
    html = `
      <div class="result-message lose">¡Se acabó el tiempo!</div>
      <div class="reveal">La palabra era <strong>${escapeHtml(r.originalWord || r.maskedWord)}</strong></div>
    `;
  } else {
    html = `
      <div class="result-message lose">${escapeHtml(guesser.name)} no ha adivinado la palabra</div>
      ${hangmanSvg(MAX_ERRORS)}
      <div class="reveal">La palabra era <strong>${escapeHtml(r.originalWord || r.maskedWord)}</strong></div>
    `;
  }

  // Marcador de la serie (siempre presente). Si bestOf = 1, es prácticamente
  // un "1 - 0" que va directo al hub.
  const scoreHtml = `
    <div class="reveal" style="font-size:17px;">
      Partida ${series.gameNumber} · al mejor de ${series.bestOf}
    </div>
    <div class="reveal" style="display:flex; justify-content:center; gap:18px; font-family:'Rye', serif; font-size:26px; color:var(--leather-dark);">
      <span>${escapeHtml(s.players[0].name)} <strong>${series.wins?.[s.players[0].userId] || 0}</strong></span>
      <span style="color:var(--muted);">–</span>
      <span><strong>${series.wins?.[s.players[1].userId] || 0}</strong> ${escapeHtml(s.players[1].name)}</span>
    </div>
  `;

  let statusHtml = '';
  if (r.resultStatus?.sending) {
    statusHtml = `<div class="info-box center"><span class="spinner"></span> Guardando resultado…</div>`;
  } else if (r.resultStatus?.ok) {
    statusHtml = `<div class="ok-box">Resultado guardado en el hub.</div>`;
  } else if (r.resultStatus?.error) {
    statusHtml = `
      <div class="error-box">No se pudo guardar el resultado: ${escapeHtml(r.resultStatus.error)}</div>
      <div class="center"><button id="retry-result">Reintentar envío</button></div>
    `;
  } else {
    statusHtml = `<div class="info-box center"><span class="spinner"></span> Enviando resultado…</div>`;
  }

  // Cuenta atrás: o bien volvemos al hub (serie terminada) o pasamos a la
  // siguiente partida (intermedio). Nunca hay botón manual.
  let countdownHtml = '';
  if (series.winner) {
    const seriesWinnerName = s.players.find(p => p.userId === series.winner)?.name || '';
    countdownHtml = `
      <div class="reveal" style="margin-top:18px;">
        🏆 Gana el partido <strong>${escapeHtml(seriesWinnerName)}</strong>
      </div>
      <div class="info-box center" id="series-countdown" style="margin-top:8px;">
        Volviendo al hub en <strong id="cd-secs">…</strong>s
      </div>
    `;
  } else {
    countdownHtml = `
      <div class="info-box center" id="series-countdown" style="margin-top:18px;">
        Siguiente partida en <strong id="cd-secs">…</strong>s
      </div>
    `;
  }

  app.innerHTML = html + scoreHtml + statusHtml + countdownHtml;

  const retry = document.getElementById('retry-result');
  if (retry) retry.onclick = async () => {
    retry.disabled = true;
    retry.innerHTML = '<span class="spinner"></span> Reintentando…';
    try { await dispatch('submit-result'); } catch (e) { alert(e.message); }
    retry.disabled = false;
  };

  // Arranca la cuenta atrás local sincronizada con el reloj del servidor.
  startResultCountdown(series);
}

let resultCountdownTimer = null;
let resultCountdownFired = false;
function stopResultCountdown() {
  if (resultCountdownTimer) { clearInterval(resultCountdownTimer); resultCountdownTimer = null; }
}
function startResultCountdown(series) {
  stopResultCountdown();
  resultCountdownFired = false;
  const target = series.winner ? series.returnAt : series.resumeAt;
  if (!target) return;
  const serverNow = series.serverNow || Date.now();
  const drift = serverNow - Date.now();
  const tick = async () => {
    const el = document.getElementById('cd-secs');
    if (!el) { stopResultCountdown(); return; }
    const remaining = Math.max(0, target - (Date.now() + drift));
    el.textContent = Math.ceil(remaining / 1000);
    if (remaining <= 0 && !resultCountdownFired) {
      resultCountdownFired = true;
      stopResultCountdown();
      if (series.winner) {
        window.location.href = HUB_URL;
      } else {
        try { await dispatch('next-round'); } catch (e) { console.warn(e.message); }
      }
    }
  };
  tick();
  resultCountdownTimer = setInterval(tick, 250);
}

// ---------- Teclado ----------
document.addEventListener('keydown', e => {
  if (ui.state?.phase !== 'guessing') return;
  if (ui.state?.round?.guesserId !== ui.me?.id) return;
  const key = e.key.toUpperCase();
  if (!ALPHABET.includes(key)) return;
  const r = ui.state.round;
  if (r.guessed.includes(key) || r.wrong.includes(key)) return;
  dispatch('guess-letter', { letter: key }).catch(err => console.warn(err.message));
});

// ---------- Init ----------
async function init() {
  const params = new URLSearchParams(location.search);
  const code = (params.get('sala') || '').trim().toUpperCase();
  if (!code) {
    ui.screen = 'error';
    ui.errorMsg = 'Falta el código de sala en la URL. Entra desde el hub.';
    render();
    return;
  }
  ui.roomCode = code;
  render();

  // Pre-cargamos los nombres de la sala (público) para mostrarlos en el login
  try {
    const room = await loadRoomMeta(code);
    if (!room) {
      ui.screen = 'error';
      ui.errorMsg = 'Sala no encontrada o caducada.';
      return render();
    }
    if (room.status && room.status !== 'open') {
      ui.screen = 'error';
      ui.errorMsg = 'Esta sala ya está cerrada.';
      return render();
    }
    const players = (room.players || []).filter(p => p.role === 'player');
    if (players.length !== 2) {
      ui.screen = 'error';
      ui.errorMsg = 'El ahorcado necesita exactamente 2 jugadores en la sala.';
      return render();
    }
    ui.roomMeta = room;
  } catch (e) {
    ui.screen = 'error';
    ui.errorMsg = e.message;
    return render();
  }

  // 1. Intentamos cargar el estado por si ya hay cookie LOCAL del juego.
  try {
    const s = await fetchState();
    onState(s);
    if (ui.me) {
      ui.screen = 'game';
      render();
      startPolling();
      return;
    }
  } catch (e) {
    if (e.status !== 401 && e.status !== 403) {
      ui.screen = 'error';
      ui.errorMsg = e.message;
      return render();
    }
  }

  // 2. Sin cookie local: probamos a heredar la sesión del hub (SSO blando).
  //    Si el navegador acepta la cookie cross-origin, no hay que escribir
  //    contraseña aquí — usamos la identidad del hub directamente.
  const hubUser = ui.roomMeta?.players?.find(p => p.role === 'player')
    ? await tryHubSession()
    : null;
  if (hubUser && ui.roomMeta.players.some(p => p.userId === hubUser.id)) {
    try {
      await setAccessCookie(hubUser);
      const s = await fetchState();
      onState(s);
      if (ui.me) {
        ui.screen = 'game';
        render();
        startPolling();
        return;
      }
    } catch {
      /* caemos al login con email+contraseña */
    }
  }

  ui.screen = 'login';
  render();
}

init();
</script>
